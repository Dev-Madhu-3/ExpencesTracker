    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #0a0a0f;
        overflow-x: hidden;
      }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glass-strong {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .gradient-text {
        background: linear-gradient(135deg, #00f0ff, #bc13fe, #ff2d95);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .bg-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.25;
        pointer-events: none;
        z-index: 0;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .expense-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .expense-card:hover {
        transform: translateX(8px);
        background: rgba(255, 255, 255, 0.06);
      }
      @keyframes confetti {
        0% {
          transform: translateY(100vh) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) rotate(720deg);
          opacity: 0;
        }
      }
      .confetti-piece {
        position: fixed;
        width: 10px;
        height: 10px;
        animation: confetti 3s ease-out forwards;
        z-index: 9999;
        pointer-events: none;
      }
      .tab-btn {
        position: relative;
        transition: all 0.3s ease;
      }
      .tab-btn::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 50%;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, #00f0ff, #bc13fe);
        transition: all 0.3s ease;
        transform: translateX(-50%);
      }
      .tab-btn.active::after {
        width: 80%;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.3);
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .progress-ring-circle {
        transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }
    </style>
  </head>

        value,
        prefix = "",
        suffix = "",
        className = "",

        const [displayValue, setDisplayValue] = useState(0);
        const prevValue = useRef(0);
        useEffect(() => {
          const start = prevValue.current,
            end = value,
            duration = 800,
            startTime = performance.now();
          const animate = (currentTime) => {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 3);
            setDisplayValue(start + (end - start) * easeOut);
            if (progress < 1) requestAnimationFrame(animate);
          };
          requestAnimationFrame(animate);
          prevValue.current = value;
        }, [value]);
        return (
          <span className={className}>
            {prefix}
            {Math.round(displayValue).toLocaleString()}
            {suffix}
          </span>
        );
      };

                            type="number"
                            value={expenseForm.amount}
                            onChange={(e) =>
                              setExpenseForm({
                                ...expenseForm,
                                amount: e.target.value,
                              })
                            }
                            placeholder="0.00"
                            className="w-full glass px-4 py-3 rounded-xl text-white text-2xl font-bold"
                          />
                        </div>
                        <div>
                          <label className="text-sm text-gray-400 mb-2 block">
                            Description
                          </label>
                          <input
                            type="text"
                            value={expenseForm.description}
                            onChange={(e) =>
                              setExpenseForm({
                                ...expenseForm,
                                description: e.target.value,
                              })
                            }
                            placeholder="What did you spend on?"
                            className="w-full glass px-4 py-3 rounded-xl text-white"
                          />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="text-sm text-gray-400 mb-2 block">
                              Category
                            </label>
                            <select
                              value={expenseForm.category}
                              onChange={(e) =>
                                setExpenseForm({
                                  ...expenseForm,
                                  category: e.target.value,
                                })
                              }
                              className="w-full glass px-4 py-3 rounded-xl text-white"
                            >
                              {CATEGORIES.map((c) => (
                                <option
                                  key={c.id}
                                  value={c.id}
                                  className="bg-[#1a1a2e]"
                                >
                                  {c.name}
                                </option>
                              ))}
                            </select>
                          </div>
                          <div>
                            <label className="text-sm text-gray-400 mb-2 block">
                              Date
                            </label>
                            <input
                              type="date"
                              value={expenseForm.date}
                              onChange={(e) =>
                                setExpenseForm({
                                  ...expenseForm,
                                  date: e.target.value,
                                })
                              }
                              className="w-full glass px-4 py-3 rounded-xl text-white"
                            />
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="text-sm text-gray-400 mb-2 block">
                              Payment Method
                            </label>
                            <select
                              value={expenseForm.paymentMethod}
                              onChange={(e) =>
                                setExpenseForm({
                                  ...expenseForm,
                                  paymentMethod: e.target.value,
                                })
                              }
                              className="w-full glass px-4 py-3 rounded-xl text-white"
                            >
                              {PAYMENT_METHODS.map((p) => (
                                <option
                                  key={p.id}
                                  value={p.id}
                                  className="bg-[#1a1a2e]"
                                >
                                  {p.icon} {p.name}
                                </option>
                              ))}
                            </select>
                          </div>
                          <div>
                            <label className="text-sm text-gray-400 mb-2 block">
                              Recurring
                            </label>
                            <select
                              value={expenseForm.recurring}
                              onChange={(e) =>
                                setExpenseForm({
                                  ...expenseForm,
                                  recurring: e.target.value,
                                })
                              }
                              className="w-full glass px-4 py-3 rounded-xl text-white"
                            >
                              {RECURRING_OPTIONS.map((r) => (
                                <option
                                  key={r.id}
                                  value={r.id}
                                  className="bg-[#1a1a2e]"
                                >
                                  {r.name}
                                </option>
                              ))}
                            </select>
                          </div>
                        </div>
                        <div>
                          <label className="text-sm text-gray-400 mb-2 block">
                            Tags (comma separated)
                          </label>
                          <input
                            type="text"
                            value={expenseForm.tags}
                            onChange={(e) =>
                              setExpenseForm({
                                ...expenseForm,
                                tags: e.target.value,
                              })
                            }
                            placeholder="important, work, personal..."
                            className="w-full glass px-4 py-3 rounded-xl text-white"
                          />
                        </div>
                        <div>
                          <label className="text-sm text-gray-400 mb-2 block">
                            Location
                          </label>
                          <input
                            type="text"
                            value={expenseForm.location}
                            onChange={(e) =>
                              setExpenseForm({
                                ...expenseForm,
                                location: e.target.value,
                              })
                            }
                            placeholder="City, State"
                            className="w-full glass px-4 py-3 rounded-xl text-white"
                          />
                        </div>
                        <motion.button
                          whileHover={{ scale: 1.02 }}
                          whileTap={{ scale: 0.98 }}
                          onClick={handleAddExpense}
                          className="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 text-white font-bold text-lg shadow-lg shadow-cyan-500/20 hover:shadow-cyan-500/40 transition-shadow"
                        >
                          Add Expense
                        </motion.button>
                      </div>
                    </motion.div>
                  </motion.div>
                )}
              </AnimatePresence>

              {/* Edit Expense Modal */}
              <AnimatePresence>
                {showEditModal && editingExpense && (
                  <motion.div
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"
                    onClick={() => setShowEditModal(false)}
                  >
                    <motion.div
                      initial={{ scale: 0.9, opacity: 0, y: 20 }}
                      animate={{ scale: 1, opacity: 1, y: 0 }}
                      exit={{ scale: 0.9, opacity: 0, y: 20 }}
                      className="glass-strong rounded-3xl p-8 w-full max-w-lg max-h-[90vh] overflow-y-auto"
                      onClick={(e) => e.stopPropagation()}
                    >
                      <div className="flex items-center justify-between mb-6">
                        <h2 className="text-2xl font-bold gradient-text">
                          Edit Expense
                        </h2>
                        <button
                          onClick={() => setShowEditModal(false)}
                          className="text-gray-400 hover:text-white"
                        >
                          <Icon name="close" className="w-6 h-6" />
                        </button>
                      </div>
                      <div className="space-y-4">
                        <div>
                          <label className="text-sm text-gray-400 mb-2 block">
                            Amount
                          </label>
                          <input
                            type="number"
                            value={editingExpense.amount}
                            onChange={(e) =>
                              setEditingExpense({
                                ...editingExpense,
                                amount: Number(e.target.value),
                              })
                            }
                            className="w-full glass px-4 py-3 rounded-xl text-white text-2xl font-bold"
                          />
                        </div>
                        <div>
                          <label className="text-sm text-gray-400 mb-2 block">
                            Description
                          </label>
                          <input
                            type="text"
                            value={editingExpense.description}
                            onChange={(e) =>
                              setEditingExpense({
                                ...editingExpense,
                                description: e.target.value,
                              })
                            }
                            className="w-full glass px-4 py-3 rounded-xl text-white"
                          />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="text-sm text-gray-400 mb-2 block">
                              Category
                            </label>
                            <select
                              value={editingExpense.category}
                              onChange={(e) =>
                                setEditingExpense({
                                  ...editingExpense,
                                  category: e.target.value,
                                })
                              }
                              className="w-full glass px-4 py-3 rounded-xl text-white"
                            >
                              {CATEGORIES.map((c) => (
                                <option
                                  key={c.id}
                                  value={c.id}
                                  className="bg-[#1a1a2e]"
                                >
                                  {c.name}
                                </option>
                              ))}
                            </select>
                          </div>
                          <div>
                            <label className="text-sm text-gray-400 mb-2 block">
                              Date
                            </label>
                            <input
                              type="date"
                              value={editingExpense.date}
                              onChange={(e) =>
                                setEditingExpense({
                                  ...editingExpense,
                                  date: e.target.value,
                                })
                              }
                              className="w-full glass px-4 py-3 rounded-xl text-white"
                            />
                          </div>
                        </div>
                        <motion.button
                          whileHover={{ scale: 1.02 }}
                          whileTap={{ scale: 0.98 }}
                          onClick={handleEditExpense}
                          className="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 text-white font-bold text-lg shadow-lg shadow-cyan-500/20"
                        >
                          Save Changes
                        </motion.button>
                      </div>
                    </motion.div>
                  </motion.div>
                )}
              </AnimatePresence>

              {/* Badge Unlock Modal */}
              <AnimatePresence>
                {showBadgeModal && newBadge && (
                  <motion.div
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    className="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4"
                    onClick={() => setShowBadgeModal(false)}
                  >
                    <motion.div
                      initial={{ scale: 0.5, opacity: 0, rotate: -10 }}
                      animate={{ scale: 1, opacity: 1, rotate: 0 }}
                      exit={{ scale: 0.5, opacity: 0, rotate: 10 }}
                      className="glass-strong rounded-3xl p-12 w-full max-w-md text-center"
                      onClick={(e) => e.stopPropagation()}
                    >
                      <motion.div
                        initial={{ y: -20 }}
                        animate={{ y: 0 }}
                        transition={{ delay: 0.2, type: "spring" }}
                        className="w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-6"
                        style={{
                          backgroundColor: `${newBadge.color}20`,
                          boxShadow: `0 0 40px ${newBadge.color}40`,
                        }}
                      >
                        <Icon
                          name={newBadge.icon}
                          className="w-12 h-12"
                          style={{ color: newBadge.color }}
                        />
                      </motion.div>
                      <motion.h2
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ delay: 0.3 }}
                        className="text-3xl font-bold mb-2"
                        style={{ color: newBadge.color }}
                      >
                        {newBadge.name}
                      </motion.h2>
                      <motion.p
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ delay: 0.4 }}
                        className="text-gray-400 mb-8"
                      >
                        {newBadge.desc}
                      </motion.p>
                      <motion.button
                        whileHover={{ scale: 1.05 }}
                        whileTap={{ scale: 0.95 }}
                        onClick={() => setShowBadgeModal(false)}
                        className="px-8 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 text-white font-bold shadow-lg shadow-cyan-500/20"
                      >
                        Awesome!
                      </motion.button>
                    </motion.div>
                  </motion.div>
                )}
              </AnimatePresence>

              {/* AI Insights Modal */}
              <AnimatePresence>
                {showAIInsights && (
                  <motion.div
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"
                    onClick={() => setShowAIInsights(false)}
                  >
                    <motion.div
                      initial={{ scale: 0.9, opacity: 0, y: 20 }}
                      animate={{ scale: 1, opacity: 1, y: 0 }}
                      exit={{ scale: 0.9, opacity: 0, y: 20 }}
                      className="glass-strong rounded-3xl p-8 w-full max-w-lg"
                      onClick={(e) => e.stopPropagation()}
                    >
                      <div className="flex items-center gap-3 mb-6">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                          <Icon name="ai" className="w-6 h-6 text-white" />
                        </div>
                        <h2 className="text-xl font-bold gradient-text">
                          AI Insights
                        </h2>
                      </div>
                      <div className="glass rounded-2xl p-6 min-h-[200px]">
                        <div className="text-sm text-gray-300 whitespace-pre-line leading-relaxed">
                          {aiMessage || "Analyzing your spending patterns..."}
                          {aiTyping && <span className="animate-pulse">|</span>}
                        </div>
                      </div>
                      <div className="flex justify-end mt-4">
                        <button
                          onClick={() => setShowAIInsights(false)}
                          className="px-6 py-2 rounded-xl glass hover:bg-white/10 text-sm"
                        >
                          Close
                        </button>
                      </div>
                    </motion.div>
                  </motion.div>
                )}
              </AnimatePresence>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ExpenseTracker />);
    </script>
  </body>
</html>
