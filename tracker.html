<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Main App Component
        function ExpenseTracker() {
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showAddModal, setShowAddModal] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editingExpense, setEditingExpense] = useState(null);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [expenses, setExpenses] = useState([]);
            const [budgets, setBudgets] = useState({});
            const [categories] = useState([
                { id: 'food', name: 'Food & Dining', icon: 'Utensils', color: 'bg-orange-500' },
                { id: 'transport', name: 'Transportation', icon: 'Car', color: 'bg-blue-500' },
                { id: 'shopping', name: 'Shopping', icon: 'ShoppingBag', color: 'bg-purple-500' },
                { id: 'entertainment', name: 'Entertainment', icon: 'Film', color: 'bg-pink-500' },
                { id: 'bills', name: 'Bills & Utilities', icon: 'FileText', color: 'bg-green-500' },
                { id: 'health', name: 'Healthcare', icon: 'Heart', color: 'bg-red-500' },
                { id: 'education', name: 'Education', icon: 'Book', color: 'bg-indigo-500' },
                { id: 'other', name: 'Other', icon: 'MoreHorizontal', color: 'bg-gray-500' }
            ]);

            // Load data from localStorage
            useEffect(() => {
                const savedExpenses = localStorage.getItem('expenses');
                const savedBudgets = localStorage.getItem('budgets');
                const savedDarkMode = localStorage.getItem('darkMode');
                
                if (savedExpenses) setExpenses(JSON.parse(savedExpenses));
                if (savedBudgets) setBudgets(JSON.parse(savedBudgets));
                if (savedDarkMode === 'true') {
                    setDarkMode(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            // Save data to localStorage
            useEffect(() => {
                localStorage.setItem('expenses', JSON.stringify(expenses));
                localStorage.setItem('budgets', JSON.stringify(budgets));
            }, [expenses, budgets]);

            // Show toast notification
            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
            };

            // Add new expense
            const addExpense = (expense) => {
                const newExpense = {
                    id: Date.now(),
                    ...expense,
                    date: expense.date || new Date().toISOString().split('T')[0]
                };
                setExpenses([...expenses, newExpense]);
                setShowAddModal(false);
                showToast('Expense added successfully!');
            };

            // Update expense
            const updateExpense = (updatedExpense) => {
                setExpenses(expenses.map(exp => exp.id === updatedExpense.id ? updatedExpense : exp));
                setShowEditModal(false);
                setEditingExpense(null);
                showToast('Expense updated successfully!');
            };

            // Delete expense
            const deleteExpense = (id) => {
                if (confirm('Are you sure you want to delete this expense?')) {
                    setExpenses(expenses.filter(exp => exp.id !== id));
                    showToast('Expense deleted successfully!');
                }
            };

            // Calculate totals
            const calculateTotals = () => {
                const today = new Date().toISOString().split('T')[0];
                const weekStart = new Date();
                weekStart.setDate(weekStart.getDate() - weekStart.getDay());
                const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1);

                const dailyExpenses = expenses.filter(exp => exp.date === today);
                const weeklyExpenses = expenses.filter(exp => new Date(exp.date) >= weekStart);
                const monthlyExpenses = expenses.filter(exp => new Date(exp.date) >= monthStart);

                const dailyTotal = dailyExpenses.reduce((sum, exp) => sum + exp.amount, 0);
                const weeklyTotal = weeklyExpenses.reduce((sum, exp) => sum + exp.amount, 0);
                const monthlyTotal = monthlyExpenses.reduce((sum, exp) => sum + exp.amount, 0);

                return { daily: dailyTotal, weekly: weeklyTotal, monthly: monthlyTotal };
            };

            // Get category expenses
            const getCategoryExpenses = () => {
                const categoryTotals = {};
                categories.forEach(cat => categoryTotals[cat.id] = 0);

                expenses.forEach(expense => {
                    if (categoryTotals[expense.category] !== undefined) {
                        categoryTotals[expense.category] += expense.amount;
                    }
                });

                return categoryTotals;
            };

            // Export to CSV
            const exportToCSV = () => {
                const headers = ['Date', 'Category', 'Description', 'Amount'];
                const csvContent = [
                    headers.join(','),
                    ...expenses.map(exp => [
                        exp.date,
                        categories.find(c => c.id === exp.category)?.name || exp.category,
                        exp.description,
                        exp.amount
                    ].join(','))
                ].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `expenses_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('Expenses exported successfully!');
            };

            const totals = calculateTotals();
            const categoryExpenses = getCategoryExpenses();

            return (
                <div className={`min-h-screen ${darkMode ? 'dark' : ''}`}>
                    <div className="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">
                        {/* Header */}
                        <header className="bg-gray-800 dark:bg-gray-800 text-white p-4 shadow-lg">
                            <div className="container mx-auto flex justify-between items-center">
                                <div className="flex items-center space-x-3">
                                    <i data-lucide="Wallet" className="w-8 h-8 text-blue-400"></i>
                                    <h1 className="text-2xl font-bold">Expense Tracker</h1>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <button 
                                        onClick={() => setDarkMode(!darkMode)}
                                        className="p-2 rounded-lg hover:bg-gray-700 transition-colors"
                                    >
                                        {darkMode ? <i data-lucide="Sun" className="w-5 h-5"></i> : <i data-lucide="Moon" className="w-5 h-5"></i>}
                                    </button>
                                    <button 
                                        onClick={exportToCSV}
                                        className="p-2 rounded-lg hover:bg-gray-700 transition-colors"
                                    >
                                        <i data-lucide="Download" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Main Content */}
                        <main className="container mx-auto p-4">
                            {/* Navigation Tabs */}
                            <div className="flex space-x-1 mb-6 bg-gray-100 dark:bg-gray-800 rounded-lg p-1">
                                {['dashboard', 'expenses', 'budgets'].map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`flex-1 py-2 px-4 rounded-md transition-colors ${
                                            activeTab === tab 
                                                ? 'bg-blue-500 text-white' 
                                                : 'hover:bg-gray-200 dark:hover:bg-gray-700'
                                        }`}
                                    >
                                        {tab.charAt(0).toUpperCase() + tab.slice(1)}
                                    </button>
                                ))}
                            </div>

                            {/* Dashboard View */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-6">
                                    {/* Summary Cards */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="bg-gradient-to-r from-blue-500 to-blue-600 text-white p-6 rounded-xl shadow-lg">
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <p className="text-blue-100">Today</p>
                                                    <p className="text-3xl font-bold mt-1">${totals.daily.toFixed(2)}</p>
                                                </div>
                                                <i data-lucide="Calendar" className="w-12 h-12 text-blue-200"></i>
                                            </div>
                                        </div>
                                        <div className="bg-gradient-to-r from-green-500 to-green-600 text-white p-6 rounded-xl shadow-lg">
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <p className="text-green-100">This Week</p>
                                                    <p className="text-3xl font-bold mt-1">${totals.weekly.toFixed(2)}</p>
                                                </div>
                                                <i data-lucide="CalendarRange" className="w-12 h-12 text-green-200"></i>
                                            </div>
                                        </div>
                                        <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white p-6 rounded-xl shadow-lg">
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <p className="text-purple-100">This Month</p>
                                                    <p className="text-3xl font-bold mt-1">${totals.monthly.toFixed(2)}</p>
                                                </div>
                                                <i data-lucide="CalendarDays" className="w-12 h-12 text-purple-200"></i>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Charts */}
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg">
                                            <h3 className="text-lg font-semibold mb-4">Category Breakdown</h3>
                                            <canvas id="categoryChart" width="400" height="200"></canvas>
                                        </div>
                                        <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg">
                                            <h3 className="text-lg font-semibold mb-4">Recent Expenses</h3>
                                            <div className="space-y-3 max-h-64 overflow-y-auto">
                                                {expenses.slice(-5).reverse().map(expense => (
                                                    <div key={expense.id} className="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
                                                        <div className="flex items-center space-x-3">
                                                            <div className={`w-10 h-10 rounded-full ${categories.find(c => c.id === expense.category)?.color} flex items-center justify-center`}>
                                                                <i data-lucide={categories.find(c => c.id === expense.category)?.icon} className="w-5 h-5 text-white"></i>
                                                            </div>
                                                            <div>
                                                                <p className="font-medium">{expense.description}</p>
                                                                <p className="text-sm text-gray-500 dark:text-gray-400">{expense.date}</p>
                                                            </div>
                                                        </div>
                                                        <span className="font-semibold text-red-600 dark:text-red-400">-${expense.amount.toFixed(2)}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Expenses View */}
                            {activeTab === 'expenses' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-bold">All Expenses</h2>
                                        <button 
                                            onClick={() => setShowAddModal(true)}
                                            className="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors flex items-center space-x-2"
                                        >
                                            <i data-lucide="Plus" className="w-4 h-4"></i>
                                            <span>Add Expense</span>
                                        </button>
                                    </div>

                                    {/* Filters */}
                                    <div className="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-lg">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <input 
                                                type="date" 
                                                className="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700"
                                                onChange={(e) => {
                                                    // Filter implementation
                        }}
                                            />
                                            <select className="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
                                                <option>All Categories</option>
                                                {categories.map(cat => (
                                                    <option key={cat.id} value={cat.id}>{cat.name}</option>
                                                ))}
                                            </select>
                                            <input 
                                                type="text" 
                                                placeholder="Search expenses..." 
                                                className="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700"
                                            />
                                        </div>
                                    </div>

                                    {/* Expenses List */}
                                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full">
                                                <thead className="bg-gray-50 dark:bg-gray-700">
                                                    <tr>
                                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Date</th>
                                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Category</th>
                                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Description</th>
                                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Amount</th>
                                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-200 dark:divide-gray-700">
                                                    {expenses.map(expense => (
                                                        <tr key={expense.id} className="hover:bg-gray-50 dark:hover:bg-gray-700">
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm">{expense.date}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap">
                                                                <div className="flex items-center space-x-2">
                                                                    <div className={`w-8 h-8 rounded-full ${categories.find(c => c.id === expense.category)?.color} flex items-center justify-center`}>
                                                                        <i data-lucide={categories.find(c => c.id === expense.category)?.icon} className="w-4 h-4 text-white"></i>
                                                                    </div>
                                                                    <span>{categories.find(c => c.id === expense.category)?.name}</span>
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4 text-sm">{expense.description}</td>
                                                            <td className="px-6 py-4 text-sm font-semibold text-red-600 dark:text-red-400">-${expense.amount.toFixed(2)}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm">
                                                                <button 
                                                                    onClick={() => {
                                                                        setEditingExpense(expense);
                                                                        setShowEditModal(true);
                                                                    }}
                                                                    className="text-blue-500 hover:text-blue-700 mr-3"
                                                                >
                                                                    <i data-lucide="Edit" className="w-4 h-4"></i>
                                                                </button>
                                                                <button 
                                                                    onClick={() => deleteExpense(expense.id)}
                                                                    className="text-red-500 hover:text-red-700"
                                                                >
                                                                    <i data-lucide="Trash2" className="w-4 h-4"></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Budgets View */}
                            {activeTab === 'budgets' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-bold">Budget Management</h2>
                                        <button 
                                            onClick={() => {
                                                const newBudget = prompt('Enter monthly budget for a category (e.g., food:500):');
                                                if (newBudget) {
                                                    const [category, amount] = newBudget.split(':');
                                                    if (category && amount) {
                                                        setBudgets({...budgets, [category.trim()]: parseFloat(amount)});
                                                        showToast('Budget added successfully!');
                                                    }
                                                }
                                            }}
                                            className="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition-colors flex items-center space-x-2"
                                        >
                                            <i data-lucide="Plus" className="w-4 h-4"></i>
                                            <span>Add Budget</span>
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {categories.map(category => {
                                            const budget = budgets[category.id] || 0;
                                            const spent = categoryExpenses[category.id] || 0;
                                            const percentage = budget > 0 ? (spent / budget) * 100 : 0;
                                            const isOverBudget = percentage > 100;

                                            return (
                                                <div key={category.id} className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg">
                                                    <div className="flex items-center justify-between mb-4">
                                                        <div className="flex items-center space-x-3">
                                                            <div className={`w-10 h-10 rounded-full ${category.color} flex items-center justify-center`}>
                                                                <i data-lucide={category.icon} className="w-5 h-5 text-white"></i>
                                                            </div>
                                                            <h3 className="font-semibold">{category.name}</h3>
                                                        </div>
                                                        <span className={`text-sm font-medium ${isOverBudget ? 'text-red-500' : 'text-green-500'}`}>
                                                            ${spent.toFixed(2)} / ${budget.toFixed(2)}
                                                        </span>
                                                    </div>
                                                    <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3">
                                                        <div 
                                                            className={`h-3 rounded-full ${isOverBudget ? 'bg-red-500' : 'bg-green-500'}`}
                                                            style={{ width: `${Math.min(percentage, 100)}%` }}
                                                        ></div>
                                                    </div>
                                                    <div className="mt-2 text-sm text-gray-500 dark:text-gray-400">
                                                        {percentage.toFixed(1)}% spent
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* Floating Action Button */}
                        <button 
                            onClick={() => setShowAddModal(true)}
                            className="fixed bottom-6 right-6 bg-blue-500 text-white w-14 h-14 rounded-full shadow-lg hover:bg-blue-600 transition-all flex items-center justify-center"
                        >
                            <i data-lucide="Plus" className="w-6 h-6"></i>
                        </button>

                        {/* Add Expense Modal */}
                        {showAddModal && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md slide-up">
                                    <div className="p-6">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xl font-bold">Add New Expense</h3>
                                            <button onClick={() => setShowAddModal(false)} className="text-gray-500 hover:text-gray-700">
                                                <i data-lucide="X" className="w-6 h-6"></i>
                                            </button>
                                        </div>
                                        <ExpenseForm 
                                            categories={categories}
                                            onSubmit={addExpense}
                                            onCancel={() => setShowAddModal(false)}
                                        />
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Edit Expense Modal */}
                        {showEditModal && editingExpense && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md slide-up">
                                    <div className="p-6">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xl font-bold">Edit Expense</h3>
                                            <button onClick={() => setShowEditModal(false)} className="text-gray-500 hover:text-gray-700">
                                                <i data-lucide="X" className="w-6 h-6"></i>
                                            </button>
                                        </div>
                                        <ExpenseForm 
                                            categories={categories}
                                            initialData={editingExpense}
                                            onSubmit={updateExpense}
                                            onCancel={() => setShowEditModal(false)}
                                        />
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Toast Notification */}
                        {toast.show && (
                            <div className={`fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white fade-in ${
                                toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'
                            }`}>
                                <div className="flex items-center space-x-2">
                                    <i data-lucide={toast.type === 'success' ? 'CheckCircle' : 'AlertCircle'} className="w-5 h-5"></i>
                                    <span>{toast.message}</span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Expense Form Component
        function ExpenseForm({ categories, initialData = null, onSubmit, onCancel }) {
            const [formData, setFormData] = useState({
                amount: initialData?.amount || '',
                category: initialData?.category || categories[0]?.id,
                description: initialData?.description || '',
                date: initialData?.date || new Date().toISOString().split('T')[0]
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit({
                    ...formData,
                    amount: parseFloat(formData.amount)
                });
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="block text-sm font-medium mb-2">Amount ($)</label>
                        <input 
                            type="number" 
                            step="0.01"
                            required
                            value={formData.amount}
                            onChange={(e) => setFormData({...formData, amount: e.target.value})}
                            className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700"
                            placeholder="0.00"
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-medium mb-2">Category</label>
                        <select 
                            required
                            value={formData.category}
                            onChange={(e) => setFormData({...formData, category: e.target.value})}
                            className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700"
                        >
                            {categories.map(cat => (
                                <option key={cat.id} value={cat.id}>{cat.name}</option>
                            ))}
                        </select>
                    </div>
                    <div>
                        <label className="block text-sm font-medium mb-2">Description</label>
                        <input 
                            type="text" 
                            required
                            value={formData.description}
                            onChange={(e) => setFormData({...formData, description: e.target.value})}
                            className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700"
                            placeholder="What did you spend on?"
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-medium mb-2">Date</label>
                        <input 
                            type="date" 
                            required
                            value={formData.date}
                            onChange={(e) => setFormData({...formData, date: e.target.value})}
                            className="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700"
                        />
                    </div>
                    <div className="flex space-x-3 pt-4">
                        <button 
                            type="submit"
                            className="flex-1 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition-colors"
                        >
                            {initialData ? 'Update' : 'Add'} Expense
                        </button>
                        <button 
                            type="button"
                            onClick={onCancel}
                            className="flex-1 bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-gray-200 py-2 rounded-lg hover:bg-gray-400 dark:hover:bg-gray-500 transition-colors"
                        >
                            Cancel
                        </button>
                    </div>
                </form>
            );
        }

        // Initialize Lucide icons
        lucide.createIcons();

        // Render the app
        ReactDOM.render(<ExpenseTracker />, document.getElementById('root'));

        // Initialize chart after render
        setTimeout(() => {
            const ctx = document.getElementById('categoryChart');
            if (ctx) {
                const app = React.getElementById('root').firstChild;
                const totals = app.calculateTotals();
                const categoryExpenses = app.getCategoryExpenses();
                const categories = app.state.categories;

                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: categories.map(cat => cat.name),
                        datasets: [{
                            data: categories.map(cat => categoryExpenses[cat.id] || 0),
                            backgroundColor: [
                                '#f97316', '#3b82f6', '#a855f7', '#ec4899',
                                '#10b981', '#ef4444', '#6366f1', '#6b7280'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    padding: 15,
                                    font: {
                                        size: 12
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }, 100);
    </script>
</body>
</html>
